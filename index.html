<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder Pro</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #eef1f5;
}

/* NAVBAR */
.navbar {
    background: #111827;
    color: white;
    padding: 15px 30px;
    font-weight: bold;
    font-size: 18px;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* FORM SIDE */
.form {
    width: 50%;
    padding: 25px;
    overflow-y: auto;
}

/* PREVIEW SIDE */
.preview {
    width: 50%;
    background: #dfe6ee;
    display: flex;
    justify-content: center;
    align-items: start;
    padding: 30px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* BUTTONS */
button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

/* RESUME PREVIEW */
.resume {
    background: white;
    width: 100%;
    max-width: 700px;
    padding: 30px;
    border-radius: 10px;
}

.resume h1 {
    margin-bottom: 5px;
}

.section {
    margin-top: 20px;
}

.section h3 {
    border-bottom: 2px solid #2563eb;
    padding-bottom: 5px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="navbar">Resume Builder Pro</div>

<div class="container">

<!-- FORM -->
<div class="form">

<div class="card">
<h3>Personal Info</h3>
<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
</div>

<div class="card">
<h3>Skills</h3>
<textarea id="skills" placeholder="e.g. JavaScript, Leadership"></textarea>
</div>

<div class="card">
<h3>Education</h3>
<div id="edu"></div>
<button onclick="addEdu()">+ Add Education</button>
</div>

<div class="card">
<h3>Experience</h3>
<div id="exp"></div>
<button onclick="addExp()">+ Add Experience</button>
</div>

<button onclick="generate()">Generate Resume</button>
<button onclick="window.print()">Download PDF</button>

</div>

<!-- PREVIEW -->
<div class="preview">
<div class="resume" id="output">
<h2>Your resume will appear here</h2>
</div>
</div>

</div>

<script>
let eduCount = 0;
let expCount = 0;

function addEdu() {
    eduCount++;
    document.getElementById("edu").innerHTML += `
        <input placeholder="School" id="school${eduCount}">
        <input placeholder="Year" id="year${eduCount}">
    `;
}

function addExp() {
    expCount++;
    document.getElementById("exp").innerHTML += `
        <input placeholder="Company" id="company${expCount}">
        <textarea placeholder="Details" id="exp${expCount}"></textarea>
    `;
}

function generate() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let skills = document.getElementById("skills").value;

    let eduHTML = "";
    for (let i = 1; i <= eduCount; i++) {
        eduHTML += `<p><b>${document.getElementById("school"+i).value}</b> (${document.getElementById("year"+i).value})</p>`;
    }

    let expHTML = "";
    for (let i = 1; i <= expCount; i++) {
        expHTML += `<p><b>${document.getElementById("company"+i).value}</b><br>${document.getElementById("exp"+i).value}</p>`;
    }

    document.getElementById("output").innerHTML = `
        <h1>${name}</h1>
        <p>${email}</p>

        <div class="section">
            <h3>Skills</h3>
            <p>${skills}</p>
        </div>

        <div class="section">
            <h3>Education</h3>
            ${eduHTML}
        </div>

        <div class="section">
            <h3>Experience</h3>
            ${expHTML}
        </div>
    `;
}
</script>

</body>
</html>
