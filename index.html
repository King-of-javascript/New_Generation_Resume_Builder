<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Resume Master — Full Builder</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Merriweather:wght@300;400;700&family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- External libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.3.2/papaparse.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>

  <style>
    :root{
      --bg:#f4f6f8; --card:#fff; --accent:#2f8f6b; --muted:#6b7280;
      --max-width:1100px; --radius:10px;
    }
    *{box-sizing:border-box}
    body{font-family:Inter, system-ui, Arial, sans-serif; margin:0; background:var(--bg); color:#111}
    .container{max-width:var(--max-width); margin:0 auto; padding:18px}
    header{background:#111;color:#fff;padding:14px 18px;border-bottom:4px solid var(--accent)}
    header h1{margin:0;font-size:1.2rem}
    .top-row{display:flex;gap:12px;align-items:center;justify-content:space-between}
    .btn{display:inline-block;background:var(--accent);color:#fff;padding:8px 12px;border-radius:8px;text-decoration:none;border:none;cursor:pointer}
    .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
    .btn.small{padding:6px 8px;font-size:.9rem}
    .builder-grid{display:grid;grid-template-columns:1fr 480px;gap:18px;margin-top:18px}
    .card{background:var(--card);padding:14px;border-radius:var(--radius);box-shadow:0 6px 18px rgba(15,23,42,0.06)}
    form label{display:block;margin-bottom:8px;font-size:.95rem}
    input[type="text"], input[type="email"], input[type="tel"], textarea, select{
      width:100%;padding:8px;border:1px solid #e6e9ee;border-radius:8px;margin-top:6px;font-size:0.95rem
    }
    textarea{resize:vertical}
    .section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .list-area > div{margin-bottom:12px}
    .skill-pill{display:inline-block;margin:4px;padding:6px 10px;background:#eef2ff;border-radius:999px;cursor:pointer}
    .preview-column{position:relative}
    .resume-preview{background:var(--card);padding:18px;border-radius:8px;min-height:420px;overflow:auto}
    .resume-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid #eef;padding-bottom:10px;margin-bottom:12px}
    .resume-preview h2{margin:0}
    .meta{color:var(--muted);font-size:.9rem}
    .section{margin-bottom:12px}
    .section h4{margin:0 0 6px 0;color:var(--accent)}
    .template-thumbs{display:flex;gap:8px;align-items:center}
    .thumb{width:72px;height:56px;border-radius:6px;border:1px solid #e6e9ee;display:flex;align-items:center;justify-content:center;font-size:11px;color:#666;background:#fff;cursor:pointer}
    /* Template styles and print-optimized sizes */
    .tpl-clean{font-family:Arial, sans-serif}
    .tpl-clean .resume-preview{font-size:11px;line-height:1.25}
    .tpl-clean .resume-preview h2{font-size:16px}
    .tpl-clean .resume-preview .section h4{font-size:12px}
    .tpl-modern{font-family:Inter, system-ui}
    .tpl-modern .resume-preview{font-size:11px;line-height:1.25}
    .tpl-modern .resume-preview h2{font-size:18px}
    .tpl-modern .resume-preview .section h4{font-size:12.5px}
    .tpl-elegant{font-family:Merriweather, serif}
    .tpl-elegant .resume-preview{font-size:11.5px;line-height:1.28}
    .tpl-elegant .resume-preview h2{font-size:18px}
    .tpl-compact{font-family:Inter, system-ui}
    .tpl-compact .resume-preview{font-size:10px;line-height:1.12;padding:10px}
    .tpl-compact .resume-header{gap:8px}
    .tpl-compact .resume-preview h2{font-size:15px}
    /* Compact two-column skills/contact for wider screens */
    .tpl-compact .resume-header{display:flex;gap:12px}
    .tpl-compact .contact-block{min-width:160px;text-align:right;font-size:10px}
    /* Tight spacing */
    .resume-preview{padding:14px}
    .resume-header{padding-bottom:6px;margin-bottom:8px}
    .section{margin-bottom:8px}
    .item{margin-bottom:6px}
    /* Accessibility */
    .resume-preview, .card, input, textarea { color-scheme: light; }
    /* Responsive */
    @media (max-width:980px){
      .builder-grid{grid-template-columns:1fr}
      .preview-column{order:-1}
    }
    /* Print */
    @media print{
      header, .form-actions, .controls, .btn, .top-row a, .import-area{display:none}
      .builder-grid{grid-template-columns:1fr}
      .resume-preview{box-shadow:none;border-radius:0;padding:0}
      .tpl-compact .resume-preview{font-size:10pt}
      .tpl-modern .resume-preview{font-size:10pt}
      .tpl-clean .resume-preview{font-size:10pt}
      .tpl-elegant .resume-preview{font-size:10.5pt}
    }

    /* Modal (CSV mapping) */
    .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); z-index: 9999; }
    .modal .modal-card { background: #fff; padding: 16px; border-radius: 8px; width: 90%; max-width: 720px; max-height: 80vh; overflow:auto; }
    .field-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
    .field-row select { flex:1; }
  </style>
</head>
<body>
  <header>
    <div class="container top-row">
      <div>
        <h1>RESUME MASTER</h1>
        <div style="font-size:.9rem;opacity:.9">Your Career, Our Expertise</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn" id="loadSample">Load Sample</button>
        <button class="btn ghost" id="exportJson">Export JSON</button>
        <button class="btn ghost" id="exportCsv">Export CSV</button>
        <button class="btn" id="exportPdfCompact">Compact PDF</button>
        <button class="btn" id="exportPdfHigh">High fidelity PDF</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="builder-grid">
      <!-- Form column -->
      <section class="card form-column" aria-label="Resume form">
        <form id="resumeForm" autocomplete="off" onsubmit="return false;">
          <div class="section-title"><strong>Basic Info</strong></div>
          <label>Full name
            <input type="text" id="fullName" placeholder="Jane Doe" />
          </label>
          <label>Job title
            <input type="text" id="jobTitle" placeholder="Product Designer" />
          </label>
          <label>Email
            <input type="email" id="email" placeholder="you@example.com" />
          </label>
          <label>Phone
            <input type="tel" id="phone" placeholder="+1 555 555 5555" />
          </label>
          <label>Summary
            <textarea id="summary" rows="3" placeholder="Short professional summary"></textarea>
          </label>

          <hr/>

          <div class="section-title"><strong>Work Experience</strong> <button type="button" id="addExperience" class="btn small">+ Add</button></div>
          <div id="experiences" class="list-area"></div>

          <hr/>

          <div class="section-title"><strong>Education</strong> <button type="button" id="addEducation" class="btn small">+ Add</button></div>
          <div id="educations" class="list-area"></div>

          <hr/>

          <div class="section-title"><strong>Skills</strong></div>
          <div id="skillsList" style="margin-bottom:8px"></div>
          <input id="skillInput" placeholder="Add a skill and press Enter" />

          <hr/>

          <div class="section-title"><strong>Template</strong></div>
          <div style="display:flex;gap:12px;align-items:center;margin-bottom:8px">
            <select id="templateSelect" style="padding:8px;border-radius:8px">
              <option value="clean">Clean</option>
              <option value="modern">Modern</option>
              <option value="elegant">Elegant</option>
              <option value="compact">Compact (one page)</option>
            </select>
            <div class="template-thumbs" aria-hidden="true">
              <div class="thumb" data-tpl="clean">Clean</div>
              <div class="thumb" data-tpl="modern">Modern</div>
              <div class="thumb" data-tpl="elegant">Elegant</div>
              <div class="thumb" data-tpl="compact">Compact</div>
            </div>
          </div>

          <div style="display:flex;gap:8px;flex-wrap:wrap" class="form-actions">
            <label class="import-area btn ghost" style="display:inline-flex;align-items:center;gap:8px;cursor:pointer">
              <input id="csvFile" type="file" accept=".csv" style="display:none" />
              Import CSV
            </label>
            <button type="button" id="mapCsvBtn" class="btn ghost">Map CSV</button>
            <button type="button" id="resetBtn" class="btn ghost">Reset</button>
            <button type="button" id="clearStorage" class="btn small">Clear Autosave</button>
          </div>
        </form>
      </section>

      <!-- Preview column -->
      <aside class="preview-column">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <strong>Live Preview</strong>
            <div class="meta">Click skill pills to remove; use Shift+Enter for bullets</div>
          </div>
          <div id="preview" class="resume-preview tpl-clean" role="region" aria-live="polite">
            <!-- Preview injected by JS -->
          </div>
        </div>
      </aside>
    </div>
  </main>

  <!-- CSV mapping modal -->
  <div id="csvModal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-card">
      <h3>Map CSV Columns</h3>
      <p>Map CSV columns to resume fields. Unmapped columns are ignored.</p>
      <div id="mappingFields"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
        <button id="applyMapping" class="btn">Apply</button>
        <button id="closeMapping" class="btn ghost">Close</button>
      </div>
    </div>
  </div>

  <script>
  (function(){
    // DOM refs
    const fullName = document.getElementById('fullName');
    const jobTitle = document.getElementById('jobTitle');
    const email = document.getElementById('email');
    const phone = document.getElementById('phone');
    const summary = document.getElementById('summary');
    const experiencesDiv = document.getElementById('experiences');
    const educationsDiv = document.getElementById('educations');
    const addExperienceBtn = document.getElementById('addExperience');
    const addEducationBtn = document.getElementById('addEducation');
    const skillsList = document.getElementById('skillsList');
    const skillInput = document.getElementById('skillInput');
    const templateSelect = document.getElementById('templateSelect');
    const preview = document.getElementById('preview');
    const csvFile = document.getElementById('csvFile');
    const exportJsonBtn = document.getElementById('exportJson');
    const exportCsvBtn = document.getElementById('exportCsv');
    const exportPdfCompactBtn = document.getElementById('exportPdfCompact');
    const exportPdfHighBtn = document.getElementById('exportPdfHigh');
    const resetBtn = document.getElementById('resetBtn');
    const clearStorage = document.getElementById('clearStorage');
    const loadSample = document.getElementById('loadSample');
    const mapCsvBtn = document.getElementById('mapCsvBtn');
    const csvModal = document.getElementById('csvModal');
    const mappingFields = document.getElementById('mappingFields');
    const applyMapping = document.getElementById('applyMapping');
    const closeMapping = document.getElementById('closeMapping');

    const LS_KEY = 'resume_master_full_v1';

    // Data model
    let data = {
      meta: { template: 'clean' },
      basics: { name:'', title:'', email:'', phone:'', summary:'' },
      experiences: [],
      educations: [],
      skills: []
    };

    // CSV mapping state
    let lastCsvHeaders = [];
    let lastCsvRows = [];

    // Helpers
    function uid(p='id'){ return p + '_' + Math.random().toString(36).slice(2,9); }
    function escapeHtml(s=''){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function nl2br(s=''){ return escapeHtml(s).replace(/\n/g,'<br/>'); }

    // Load/save
    function load(){
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) data = JSON.parse(raw);
      } catch(e){ console.warn(e) }
    }
    function save(){ try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e){ console.warn(e) } }

    // Render functions
    function renderExperiences(){
      experiencesDiv.innerHTML = '';
      data.experiences.forEach(exp => {
        const el = document.createElement('div');
        el.innerHTML = `
          <div style="border:1px dashed #eef;padding:8px;border-radius:8px">
            <label>Company <input data-id="${exp.id}" data-field="company" value="${exp.company || ''}" /></label>
            <label>Role <input data-id="${exp.id}" data-field="role" value="${exp.role || ''}" /></label>
            <label>Period <input data-id="${exp.id}" data-field="period" value="${exp.period || ''}" /></label>
            <label>Details (Shift+Enter for new bullet) <textarea data-id="${exp.id}" data-field="details">${exp.details || ''}</textarea></label>
            <div style="margin-top:6px"><button data-id="${exp.id}" class="btn small remove-exp">Remove</button></div>
          </div>
        `;
        experiencesDiv.appendChild(el);
      });
    }
    function renderEducations(){
      educationsDiv.innerHTML = '';
      data.educations.forEach(ed => {
        const el = document.createElement('div');
        el.innerHTML = `
          <div style="border:1px dashed #eef;padding:8px;border-radius:8px">
            <label>Institution <input data-id="${ed.id}" data-field="institution" value="${ed.institution || ''}" /></label>
            <label>Degree <input data-id="${ed.id}" data-field="degree" value="${ed.degree || ''}" /></label>
            <label>Period <input data-id="${ed.id}" data-field="period" value="${ed.period || ''}" /></label>
            <div style="margin-top:6px"><button data-id="${ed.id}" class="btn small remove-edu">Remove</button></div>
          </div>
        `;
        educationsDiv.appendChild(el);
      });
    }
    function renderSkills(){
      skillsList.innerHTML = '';
      data.skills.forEach(s => {
        const span = document.createElement('span');
        span.className = 'skill-pill';
        span.textContent = s;
        span.title = 'Click to remove';
        span.addEventListener('click', () => {
          data.skills = data.skills.filter(x => x !== s);
          save(); renderSkills(); renderPreview();
        });
        skillsList.appendChild(span);
      });
    }

    // Render details as bullets if multiple lines
    function renderDetailsAsList(text){
      if (!text) return '';
      const lines = String(text).split(/\n+/).map(s=>s.trim()).filter(Boolean);
      if (lines.length <= 1) return `<div>${escapeHtml(text)}</div>`;
      return '<ul>' + lines.map(l=>`<li>${escapeHtml(l)}</li>`).join('') + '</ul>';
    }

    function renderPreview(){
      const tpl = data.meta.template || 'clean';
      preview.className = 'resume-preview tpl-' + (tpl === 'compact' ? 'compact' : tpl);
      // Contact block for compact template
      const contactBlock = tpl === 'compact' ? `<div class="contact-block">
        <div>${escapeHtml(data.basics.email || '')}</div>
        <div>${escapeHtml(data.basics.phone || '')}</div>
      </div>` : `<div class="meta" style="text-align:right">
        <div>${escapeHtml(data.basics.email || '')}</div>
        <div>${escapeHtml(data.basics.phone || '')}</div>
      </div>`;

      preview.innerHTML = `
        <div class="resume-header">
          <div>
            <h2>${escapeHtml(data.basics.name || 'Your Name')}</h2>
            <div class="meta">${escapeHtml(data.basics.title || '')}</div>
          </div>
          ${contactBlock}
        </div>

        <div class="section">
          <h4>Summary</h4>
          <div class="item">${nl2br(data.basics.summary || 'A short professional summary.')}</div>
        </div>

        <div class="section">
          <h4>Experience</h4>
          ${data.experiences.map(e => `
            <div class="item">
              <strong>${escapeHtml(e.role || '')}</strong> — ${escapeHtml(e.company || '')}
              <div class="meta">${escapeHtml(e.period || '')}</div>
              <div>${renderDetailsAsList(e.details || '')}</div>
            </div>
          `).join('')}
        </div>

        <div class="section">
          <h4>Education</h4>
          ${data.educations.map(ed => `
            <div class="item">
              <strong>${escapeHtml(ed.degree || '')}</strong> — ${escapeHtml(ed.institution || '')}
              <div class="meta">${escapeHtml(ed.period || '')}</div>
            </div>
          `).join('')}
        </div>

        <div class="section">
          <h4>Skills</h4>
          <div class="item">${data.skills.map(s => `<span style="display:inline-block;margin:4px;padding:6px 8px;background:#f3f4f6;border-radius:12px">${escapeHtml(s)}</span>`).join('')}</div>
        </div>
      `;
    }

    // Wire events immediately
    function wireImmediate(){
      // Basic fields
      [fullName, jobTitle, email, phone, summary].forEach(el => {
        el.addEventListener('input', () => {
          data.basics.name = fullName.value.trim();
          data.basics.title = jobTitle.value.trim();
          data.basics.email = email.value.trim();
          data.basics.phone = phone.value.trim();
          data.basics.summary = summary.value.trim();
          save(); renderPreview();
        });
      });

      // Add experience/education
      addExperienceBtn.addEventListener('click', () => {
        data.experiences.push({ id: uid('exp'), company:'', role:'', period:'', details:'' });
        save(); renderExperiences(); renderPreview();
      });
      addEducationBtn.addEventListener('click', () => {
        data.educations.push({ id: uid('edu'), institution:'', degree:'', period:'' });
        save(); renderEducations(); renderPreview();
      });

      // Delegate input changes for dynamic lists
      [experiencesDiv, educationsDiv].forEach(container => {
        container.addEventListener('input', (ev) => {
          const t = ev.target;
          const id = t.dataset.id;
          const field = t.dataset.field;
          if (!id || !field) return;
          const list = container === experiencesDiv ? data.experiences : data.educations;
          const item = list.find(x => x.id === id);
          if (item) {
            item[field] = t.value;
            save(); renderPreview();
          }
        });
        container.addEventListener('click', (ev) => {
          const btn = ev.target.closest('button.remove-exp, button.remove-edu');
          if (!btn) return;
          const id = btn.dataset.id;
          if (!id) return;
          if (btn.classList.contains('remove-exp')) data.experiences = data.experiences.filter(x => x.id !== id);
          else data.educations = data.educations.filter(x => x.id !== id);
          save(); renderExperiences(); renderEducations(); renderPreview();
        });
      });

      // Skills input
      skillInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const v = skillInput.value.trim();
          if (v && !data.skills.includes(v)) {
            data.skills.push(v);
            skillInput.value = '';
            save(); renderSkills(); renderPreview();
          }
        }
      });

      // Template selector & thumbs
      templateSelect.addEventListener('change', () => {
        const val = templateSelect.value;
        data.meta.template = val === 'compact' ? 'compact' : val;
        save(); renderPreview();
      });
      document.querySelectorAll('.thumb').forEach(t => {
        t.addEventListener('click', () => {
          const tpl = t.dataset.tpl;
          templateSelect.value = tpl === 'compact' ? 'compact' : tpl;
          data.meta.template = tpl === 'compact' ? 'compact' : tpl;
          save(); renderPreview();
        });
      });

      // CSV file input wiring (uses PapaParse when available)
      csvFile.addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (!f) return;
        if (!window.Papa) {
          alert('CSV library not loaded yet. Try again in a moment.');
          return;
        }
        Papa.parse(f, {
          header: true,
          skipEmptyLines: true,
          complete: function(results){
            const rows = results.data;
            if (!rows || rows.length === 0) return alert('CSV appears empty or invalid.');
            lastCsvRows = rows;
            lastCsvHeaders = Object.keys(rows[0] || {});
            // Open mapping modal prefilled
            openMappingModal(lastCsvHeaders);
          },
          error: function(err){ alert('CSV import failed: ' + err.message) }
        });
      });

      // Map CSV button (open modal if CSV already loaded)
      mapCsvBtn.addEventListener('click', () => {
        if (!lastCsvHeaders.length) return alert('Choose a CSV file first (Import CSV).');
        openMappingModal(lastCsvHeaders);
      });

      // Export JSON
      exportJsonBtn.addEventListener('click', () => {
        const payload = JSON.stringify(data, null, 2);
        const blob = new Blob([payload], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = (data.basics.name || 'resume') + '.json';
        document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      });

      // Export CSV
      exportCsvBtn.addEventListener('click', () => {
        const row = {
          name: data.basics.name || '',
          title: data.basics.title || '',
          email: data.basics.email || '',
          phone: data.basics.phone || '',
          summary: data.basics.summary || '',
          company: (data.experiences[0] && data.experiences[0].company) || '',
          role: (data.experiences[0] && data.experiences[0].role) || '',
          period: (data.experiences[0] && data.experiences[0].period) || '',
          details: (data.experiences[0] && data.experiences[0].details) || '',
          institution: (data.educations[0] && data.educations[0].institution) || '',
          degree: (data.educations[0] && data.educations[0].degree) || '',
          edu_period: (data.educations[0] && data.educations[0].period) || '',
          skills: (data.skills || []).join(', ')
        };
        if (window.Papa) {
          const csv = Papa.unparse([row]);
          const blob = new Blob([csv], {type:'text/csv'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = (data.basics.name || 'resume') + '.csv';
          document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        } else {
          const keys = Object.keys(row);
          const csv = keys.join(',') + '\n' + keys.map(k => `"${String(row[k]||'').replace(/"/g,'""')}"`).join(',');
          const blob = new Blob([csv], {type:'text/csv'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = (data.basics.name || 'resume') + '.csv';
          document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        }
      });

      // Compact PDF export (html2canvas + jsPDF)
      exportPdfCompactBtn.addEventListener('click', async () => {
        if (!window.html2canvas || !window.jspdf) {
          alert('PDF libraries are still loading. Please try again in a moment.');
          return;
        }
        try {
          const { jsPDF } = window.jspdf;
          const node = preview;
          const originalBg = node.style.backgroundColor;
          node.style.backgroundColor = '#fff';
          const canvas = await html2canvas(node, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
          const imgData = canvas.toDataURL('image/jpeg', 0.9);
          const pdf = new jsPDF({ unit: 'pt', format: 'a4', compress: true });
          const pageWidth = pdf.internal.pageSize.getWidth();
          const pageHeight = pdf.internal.pageSize.getHeight();
          const margin = 20;
          const imgProps = { width: canvas.width, height: canvas.height };
          const ratio = Math.min((pageWidth - margin*2) / imgProps.width, (pageHeight - margin*2) / imgProps.height);
          const imgW = imgProps.width * ratio;
          const imgH = imgProps.height * ratio;
          pdf.addImage(imgData, 'JPEG', margin, margin, imgW, imgH, undefined, 'FAST');
          // Multi-page handling
          let remainingHeight = imgProps.height - (pageHeight - margin*2)/ratio;
          let offsetY = (pageHeight - margin*2)/ratio;
          while (remainingHeight > 0) {
            pdf.addPage();
            const sx = 0;
            const sy = offsetY;
            const sWidth = imgProps.width;
            const sHeight = Math.min(imgProps.height - offsetY, (pageHeight - margin*2)/ratio);
            const tmp = document.createElement('canvas');
            tmp.width = sWidth;
            tmp.height = sHeight;
            const ctx = tmp.getContext('2d');
            ctx.drawImage(canvas, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);
            const partData = tmp.toDataURL('image/jpeg', 0.9);
            pdf.addImage(partData, 'JPEG', margin, margin, imgW, sHeight * ratio, undefined, 'FAST');
            offsetY += sHeight;
            remainingHeight -= sHeight;
          }
          const filename = (data.basics.name || 'resume') + '.pdf';
          pdf.save(filename);
          node.style.backgroundColor = originalBg;
        } catch (err) {
          alert('PDF export failed: ' + (err && err.message ? err.message : err));
          console.error(err);
        }
      });

      // High-fidelity PDF export (html2pdf.js) - preserves selectable text where possible
      exportPdfHighBtn.addEventListener('click', async () => {
        if (!window.html2pdf) {
          alert('High-fidelity PDF library is still loading. Try again in a moment.');
          return;
        }
        try {
          const opt = {
            margin:       10,
            filename:     (data.basics.name || 'resume') + '.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
            jsPDF:        { unit: 'pt', format: 'a4', orientation: 'portrait' },
            enableLinks: true
          };
          // Use a clone to avoid layout shifts
          const clone = preview.cloneNode(true);
          clone.style.boxShadow = 'none';
          clone.style.margin = '0';
          clone.style.background = '#fff';
          document.body.appendChild(clone);
          await html2pdf().set(opt).from(clone).save();
          clone.remove();
        } catch (err) {
          alert('High-fidelity PDF export failed: ' + (err && err.message ? err.message : err));
          console.error(err);
        }
      });

      // Reset & clear storage
      resetBtn.addEventListener('click', () => {
        if (!confirm('Reset all data?')) return;
        data = { meta:{template:'clean'}, basics:{name:'',title:'',email:'',phone:'',summary:''}, experiences:[], educations:[], skills:[] };
        save(); renderAll();
      });
      clearStorage.addEventListener('click', () => {
        if (!confirm('Clear autosaved data from this browser?')) return;
        localStorage.removeItem(LS_KEY);
        alert('Autosave cleared.');
      });

      // Load sample
      loadSample.addEventListener('click', () => {
        data = {
          meta:{template:'modern'},
          basics:{name:'Alex Rivera', title:'Frontend Engineer', email:'alex.rivera@example.com', phone:'+63 912 345 6789', summary:'Frontend engineer with 5+ years building responsive web apps.'},
          experiences:[
            {id:uid('exp'), company:'BrightApps', role:'Senior Frontend Engineer', period:'2021 — Present', details:'Led UI rebuild; improved performance by 40%.\nImplemented accessibility improvements.'},
            {id:uid('exp'), company:'WebWorks', role:'Frontend Developer', period:'2018 — 2021', details:'Built component library and design system.\nCollaborated with designers to ship features.'}
          ],
          educations:[
            {id:uid('edu'), institution:'State University', degree:'B.S. Computer Science', period:'2014 — 2018'}
          ],
          skills:['JavaScript','React','HTML','CSS']
        };
        save(); renderAll();
      });

      // Mapping modal handlers
      function openMappingModal(headers){
        mappingFields.innerHTML = '';
        csvModal.style.display = 'flex';
        csvModal.setAttribute('aria-hidden','false');
        // Fields to map
        const fields = [
          {key:'name', label:'Full name'},
          {key:'title', label:'Job title'},
          {key:'email', label:'Email'},
          {key:'phone', label:'Phone'},
          {key:'summary', label:'Summary'},
          {key:'company', label:'Company (experience)'},
          {key:'role', label:'Role (experience)'},
          {key:'period', label:'Period (experience)'},
          {key:'details', label:'Details (experience)'},
          {key:'institution', label:'Institution (education)'},
          {key:'degree', label:'Degree (education)'},
          {key:'edu_period', label:'Period (education)'},
          {key:'skills', label:'Skills (comma separated)'}
        ];
        fields.forEach(f => {
          const row = document.createElement('div');
          row.className = 'field-row';
          const lbl = document.createElement('div');
          lbl.style.width='180px';
          lbl.textContent = f.label;
          const sel = document.createElement('select');
          sel.dataset.field = f.key;
          const emptyOpt = document.createElement('option');
          emptyOpt.value = '';
          emptyOpt.textContent = '(none)';
          sel.appendChild(emptyOpt);
          headers.forEach(h => {
            const o = document.createElement('option');
            o.value = h; o.textContent = h;
            sel.appendChild(o);
          });
          row.appendChild(lbl);
          row.appendChild(sel);
          mappingFields.appendChild(row);
        });
      }
      applyMapping.addEventListener('click', () => {
        // Read mapping
        const selects = mappingFields.querySelectorAll('select');
        const map = {};
        selects.forEach(s => { if (s.value) map[s.dataset.field] = s.value; });
        if (!lastCsvRows.length) { alert('No CSV loaded.'); return; }
        // Apply mapping: basics from first row
        const r0 = lastCsvRows[0];
        if (map.name && r0[map.name]) data.basics.name = r0[map.name];
        if (map.title && r0[map.title]) data.basics.title = r0[map.title];
        if (map.email && r0[map.email]) data.basics.email = r0[map.email];
        if (map.phone && r0[map.phone]) data.basics.phone = r0[map.phone];
        if (map.summary && r0[map.summary]) data.basics.summary = r0[map.summary];
        // Experiences: any row with company or role mapped
        data.experiences = lastCsvRows.filter(r => (map.company && r[map.company]) || (map.role && r[map.role])).map(r => ({
          id: uid('exp'),
          company: map.company ? (r[map.company]||'') : '',
          role: map.role ? (r[map.role]||'') : '',
          period: map.period ? (r[map.period]||'') : '',
          details: map.details ? (r[map.details]||'') : ''
        }));
        // Educations
        data.educations = lastCsvRows.filter(r => (map.institution && r[map.institution]) || (map.degree && r[map.degree])).map(r => ({
          id: uid('edu'),
          institution: map.institution ? (r[map.institution]||'') : '',
          degree: map.degree ? (r[map.degree]||'') : '',
          period: map.edu_period ? (r[map.edu_period]||'') : (map.period ? (r[map.period]||'') : '')
        }));
        // Skills
        if (map.skills && r0[map.skills]) {
          const s = String(r0[map.skills]).split(',').map(x=>x.trim()).filter(Boolean);
          data.skills = Array.from(new Set((data.skills||[]).concat(s)));
        }
        save(); renderAll();
        csvModal.style.display = 'none';
        csvModal.setAttribute('aria-hidden','true');
      });
      closeMapping.addEventListener('click', () => {
        csvModal.style.display = 'none';
        csvModal.setAttribute('aria-hidden','true');
      });

    } // wireImmediate

    // Render all to form & preview
    function renderAll(){
      fullName.value = data.basics.name || '';
      jobTitle.value = data.basics.title || '';
      email.value = data.basics.email || '';
      phone.value = data.basics.phone || '';
      summary.value = data.basics.summary || '';
      templateSelect.value = data.meta.template === 'compact' ? 'compact' : (data.meta.template || 'clean');
      renderExperiences(); renderEducations(); renderSkills(); renderPreview();
    }

    // Initialize
    function init(){
      load();
      wireImmediate();
      renderAll();
      setInterval(save, 2000);
      window.addEventListener('beforeunload', save);
    }

    init();
  })();
  </script>
</body>
