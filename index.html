<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder Pro</title>

<style>
body { margin:0; font-family:Arial; background:#eef1f5; }
.container { display:flex; height:100vh; }

.form { width:40%; padding:20px; overflow:auto; }
.preview { width:60%; background:#ccc; display:flex; justify-content:center; padding:20px; }

.card { background:white; padding:15px; margin-bottom:15px; border-radius:8px; }

input, textarea, select {
    width:100%; padding:8px; margin:5px 0;
}

button {
    padding:8px 12px;
    background:#2563eb;
    color:white;
    border:none;
    margin:5px 2px;
    cursor:pointer;
}

.delete-btn { background:red; }

/* TEMPLATE BASE */
.resume {
    width:794px;
    min-height:1123px;
    background:white;
    padding:40px;
}

/* TEMPLATE 1 (CLASSIC) */
.classic h1 { margin:0; }
.classic .section { margin-top:20px; }
.classic .section h3 { border-bottom:2px solid black; }

/* TEMPLATE 2 (MODERN) */
.modern {
    font-family: 'Segoe UI';
}
.modern h1 {
    color:#2563eb;
}
.modern .section h3 {
    color:#2563eb;
    border-left:5px solid #2563eb;
    padding-left:8px;
}

/* PRINT */
@media print {
    body * { visibility:hidden; }
    .resume, .resume * { visibility:visible; }
    .resume { position:absolute; left:0; top:0; width:100%; }
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="form">

<div class="card">
<h3>Template</h3>
<select id="template">
<option value="classic">Classic</option>
<option value="modern">Modern</option>
</select>
</div>

<div class="card">
<h3>Personal</h3>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
</div>

<div class="card">
<h3>Skills</h3>
<textarea id="skills"></textarea>
</div>

<div class="card">
<h3>Education</h3>
<div id="edu"></div>
<button onclick="addEdu()">+ Add</button>
</div>

<div class="card">
<h3>Experience</h3>
<div id="exp"></div>
<button onclick="addExp()">+ Add</button>
</div>

<button onclick="generate()">Generate</button>
<button onclick="window.print()">Download PDF</button>

</div>

<!-- PREVIEW -->
<div class="preview">
<div id="output" class="resume"></div>
</div>

</div>

<script>
let eduCount=0, expCount=0;

/* AUTO SAVE */
document.addEventListener("input", ()=>{
    localStorage.setItem("resumeData", JSON.stringify({
        name: name.value,
        email: email.value,
        skills: skills.value,
        template: template.value
    }));
});

/* LOAD */
window.onload = ()=>{
    let data = JSON.parse(localStorage.getItem("resumeData")||"{}");
    if(data.name) name.value = data.name;
    if(data.email) email.value = data.email;
    if(data.skills) skills.value = data.skills;
    if(data.template) template.value = data.template;
}

/* ADD/REMOVE */
function addEdu(){
    eduCount++;
    edu.innerHTML += `
    <div id="edu${eduCount}">
        <input id="school${eduCount}" placeholder="School">
        <input id="year${eduCount}" placeholder="Year">
        <button class="delete-btn" onclick="removeEdu(${eduCount})">Delete</button>
    </div>`;
}
function removeEdu(id){ document.getElementById("edu"+id)?.remove(); }

function addExp(){
    expCount++;
    exp.innerHTML += `
    <div id="exp${expCount}">
        <input id="company${expCount}" placeholder="Company">
        <textarea id="desc${expCount}"></textarea>
        <button class="delete-btn" onclick="removeExp(${expCount})">Delete</button>
    </div>`;
}
function removeExp(id){ document.getElementById("exp"+id)?.remove(); }

/* GENERATE */
function generate(){
    let tpl = template.value;

    let eduHTML="", expHTML="";

    for(let i=1;i<=eduCount;i++){
        let s=document.getElementById("school"+i);
        let y=document.getElementById("year"+i);
        if(s&&y) eduHTML+=`<p><b>${s.value}</b> (${y.value})</p>`;
    }

    for(let i=1;i<=expCount;i++){
        let c=document.getElementById("company"+i);
        let d=document.getElementById("desc"+i);
        if(c&&d) expHTML+=`<p><b>${c.value}</b><br>${d.value}</p>`;
    }

    output.className = "resume " + tpl;

    output.innerHTML = `
        <h1>${name.value}</h1>
        <p>${email.value}</p>

        <div class="section">
            <h3>Skills</h3>
            <p>${skills.value}</p>
        </div>

        <div class="section">
            <h3>Education</h3>
            ${eduHTML}
        </div>

        <div class="section">
            <h3>Experience</h3>
            ${expHTML}
        </div>
    `;
}
</script>

</body>
</html>
