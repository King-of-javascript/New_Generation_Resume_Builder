<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Master</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

.navbar {
    background: #333;
    padding: 10px;
    text-align: center;
}

.navbar a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

.header {
    background: #4CAF50;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    display: flex;
    flex-wrap: wrap;
}

.form-section, .preview-section {
    width: 50%;
    padding: 20px;
}

input, textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
}

button {
    padding: 10px;
    background: #4CAF50;
    color: white;
    border: none;
    margin: 5px 0;
    cursor: pointer;
}

.preview-box {
    background: white;
    padding: 20px;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="navbar">
    <a href="#form">Create</a>
    <a href="#preview">Preview</a>
</div>

<div class="header">
    <h1>Resume Master</h1>
    <p>Build your professional resume instantly</p>
</div>

<div class="container">

<!-- FORM -->
<div class="form-section" id="form">
    <h2>Fill Details</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="email" placeholder="Email">
    <textarea id="skills" placeholder="Skills"></textarea>

    <h3>Education</h3>
    <div id="education"></div>
    <button onclick="addEducation()">+ Add Education</button>

    <h3>Experience</h3>
    <div id="experience"></div>
    <button onclick="addExperience()">+ Add Experience</button>

    <br><br>
    <button onclick="generateResume()">Generate Resume</button>
    <button onclick="window.print()">Download PDF</button>
</div>

<!-- PREVIEW -->
<div class="preview-section" id="preview">
    <h2>Preview</h2>
    <div class="preview-box" id="output"></div>
</div>

</div>

<script>
let eduCount = 0;
let expCount = 0;

function addEducation() {
    eduCount++;
    document.getElementById("education").innerHTML += `
        <input type="text" placeholder="School" id="school${eduCount}">
        <input type="text" placeholder="Year" id="year${eduCount}">
    `;
}

function addExperience() {
    expCount++;
    document.getElementById("experience").innerHTML += `
        <input type="text" placeholder="Company" id="company${expCount}">
        <textarea placeholder="Details" id="exp${expCount}"></textarea>
    `;
}

function generateResume() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let skills = document.getElementById("skills").value;

    let eduHTML = "";
    for (let i = 1; i <= eduCount; i++) {
        eduHTML += `<p><b>${document.getElementById("school"+i).value}</b> (${document.getElementById("year"+i).value})</p>`;
    }

    let expHTML = "";
    for (let i = 1; i <= expCount; i++) {
        expHTML += `<p><b>${document.getElementById("company"+i).value}</b><br>${document.getElementById("exp"+i).value}</p>`;
    }

    document.getElementById("output").innerHTML = `
        <h2>${name}</h2>
        <p>${email}</p>

        <h3>Skills</h3>
        <p>${skills}</p>

        <h3>Education</h3>
        ${eduHTML}

        <h3>Experience</h3>
        ${expHTML}
    `;
}
</script>

</body>
</html>
