<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #eef1f5;
}

/* LAYOUT */
.container {
    display: flex;
    height: 100vh;
}

.form {
    width: 45%;
    padding: 20px;
    overflow-y: auto;
}

.preview {
    width: 55%;
    background: #ccc;
    display: flex;
    justify-content: center;
    padding: 20px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
}

/* INPUT */
input, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
}

/* BUTTONS */
button {
    padding: 8px 12px;
    margin: 5px 2px;
    border: none;
    cursor: pointer;
    background: #2563eb;
    color: white;
}

.delete-btn {
    background: red;
}

/* RESUME STYLE */
.resume {
    width: 794px; /* A4 width */
    min-height: 1123px;
    background: white;
    padding: 40px;
}

.resume h1 {
    margin: 0;
}

.section {
    margin-top: 20px;
}

.section h3 {
    border-bottom: 2px solid black;
    padding-bottom: 5px;
}

/* PRINT FIX */
@media print {
    body * {
        visibility: hidden;
    }

    .resume, .resume * {
        visibility: visible;
    }

    .resume {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="form">

<div class="card">
<h3>Personal Info</h3>
<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
</div>

<div class="card">
<h3>Skills</h3>
<textarea id="skills"></textarea>
</div>

<div class="card">
<h3>Education</h3>
<div id="edu"></div>
<button onclick="addEdu()">+ Add</button>
</div>

<div class="card">
<h3>Experience</h3>
<div id="exp"></div>
<button onclick="addExp()">+ Add</button>
</div>

<button onclick="generate()">Generate</button>
<button onclick="window.print()">Download PDF</button>

</div>

<!-- PREVIEW -->
<div class="preview">
<div class="resume" id="output"></div>
</div>

</div>

<script>
let eduCount = 0;
let expCount = 0;

function addEdu() {
    eduCount++;
    document.getElementById("edu").innerHTML += `
        <div id="edu${eduCount}">
            <input id="school${eduCount}" placeholder="School">
            <input id="year${eduCount}" placeholder="Year">
            <button class="delete-btn" onclick="removeEdu(${eduCount})">Delete</button>
        </div>
    `;
}

function removeEdu(id) {
    document.getElementById("edu"+id).remove();
}

function addExp() {
    expCount++;
    document.getElementById("exp").innerHTML += `
        <div id="exp${expCount}">
            <input id="company${expCount}" placeholder="Company">
            <textarea id="desc${expCount}" placeholder="Details"></textarea>
            <button class="delete-btn" onclick="removeExp(${expCount})">Delete</button>
        </div>
    `;
}

function removeExp(id) {
    document.getElementById("exp"+id).remove();
}

function generate() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let skills = document.getElementById("skills").value;

    let eduHTML = "";
    for (let i = 1; i <= eduCount; i++) {
        let school = document.getElementById("school"+i);
        let year = document.getElementById("year"+i);
        if (school && year) {
            eduHTML += `<p><b>${school.value}</b> (${year.value})</p>`;
        }
    }

    let expHTML = "";
    for (let i = 1; i <= expCount; i++) {
        let company = document.getElementById("company"+i);
        let desc = document.getElementById("desc"+i);
        if (company && desc) {
            expHTML += `<p><b>${company.value}</b><br>${desc.value}</p>`;
        }
    }

    document.getElementById("output").innerHTML = `
        <h1>${name}</h1>
        <p>${email}</p>

        <div class="section">
            <h3>Skills</h3>
            <p>${skills}</p>
        </div>

        <div class="section">
            <h3>Education</h3>
            ${eduHTML}
        </div>

        <div class="section">
            <h3>Experience</h3>
            ${expHTML}
        </div>
    `;
}
</script>

</body>
</html>
