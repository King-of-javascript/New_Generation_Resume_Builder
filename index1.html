<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Resume Maker</title>
    <link rel="stylesheet" href="../css1/styles.css">
    <style>
        .info-tooltip {
            position: relative;
            display: inline-block;
            cursor: pointer;
            color: #4CAF50;
        }

        .info-tooltip .tooltip-text {
            visibility: hidden;
            width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 5px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -100px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .info-tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <nav>
            <ul>
                <li><a href="../index2.html#home">Home</a></li>
                <li><a href="index1.html#resume">Resume</a></li>
                <li><a href="index1.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="resume" class="content">
        <h2>Create Your Resume</h2>
        <form id="resumeForm">
            <!-- Name Section -->
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" required placeholder="Enter your first name"><br>

            <label for="familyName">Family Name:</label>
            <input type="text" id="familyName" name="familyName" required placeholder="Enter your family name"><br>

            <!-- Education Section -->
            <h3>Education</h3>
            <div id="educationFields">
                <div class="educationGroup">
                    <label for="college1">College Name:</label>
                    <input type="text" id="college1" name="college1" required placeholder="Enter your college name"><br>

                    <label for="year1">Year of Graduation:</label>
                    <input type="text" id="year1" name="year1" required placeholder="Enter year of graduation"><br>

                    <label for="education1">Education Details:</label>
                    <textarea id="education1" name="education1" required placeholder="Enter details about your education"></textarea><br>
                </div>
            </div>
            <button type="button" onclick="addEducation()">Add More Education</button><br>

            <!-- Work Experience Section -->
            <h3>Work Experience</h3>
            <div id="experienceFields">
                <div class="experienceGroup">
                    <label for="company1">Company Name:</label>
                    <input type="text" id="company1" name="company1" required placeholder="Enter company name"><br>

                    <label for="workDates1">Work Dates:</label>
                    <input type="text" id="workDates1" name="workDates1" required placeholder="Enter work dates"><br>

                    <label for="experience1">Work Experience Details:</label>
                    <textarea id="experience1" name="experience1" required placeholder="Enter details about your work experience"></textarea><br>

                    <label for="achievements1">Achievements:</label>
                    <textarea id="achievements1" name="achievements1" placeholder="Enter any achievements"></textarea><br>
                </div>
            </div>
            <button type="button" onclick="addExperience()">Add More Experience</button><br>

            <!-- Skills Section -->
            <label for="skills">Skills:</label>
            <textarea id="skills" name="skills" required placeholder="Enter your skills"></textarea><br>

            <input type="submit" value="Generate Resume">
        </form>
    </section>

    <section id="preview" class="content">
        <h2>Resume Preview</h2>
        <div id="resumePreview">
            <!-- Display the filled form data here -->
        </div>
    </section>
    
    <section id="contact" class="content">
        <h2>Contact Us</h2>
        <p>Email: <a href="mailto:Michael.Toyaoan1@gmail.com">Michael.Toyaoan1@gmail.com</a></p>
        <p>Phone: <a href="tel:+1234567890">+1234567890</a></p>
    </section>

    <footer class="footer">
        <p>&copy; 2024 Resume Master. All rights reserved.</p>
    </footer>

    <script src="../js1/script.js"></script>
</body>
</html>
